name: Generate 3D Contribution Calendar

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    name: Generate 3D Contribution Graph
    steps:
      - uses: actions/checkout@v3
      - uses: yoshi389111/github-profile-3d-contrib@0.7.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: Hassan-Jamal8735
      - name: Commit & Push
        run: |
          git config user.email "hassanjamal8735@gmail.com"
          git config user.name "Hassan Jamal"
          git add -A
          git commit -m "Generate 3D contribution calendar" || true
          git push